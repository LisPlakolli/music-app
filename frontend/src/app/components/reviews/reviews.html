<div class="reviews-page">
    <h1>Your Reviews</h1>

    <p class="message" *ngIf="message">{{ message }}</p>

    <div *ngIf="reviews.length > 0" class="reviews-grid">
      <div class="review-card" *ngFor="let review of reviews">
        <div class="review-header">
          <h2>{{ review.album?.title || 'Unknown Album' }}</h2>
          <span class="rating">{{ getStars(review.rating || 0) }}</span>
        </div>

        <p class="review-meta">
          <strong>Rating:</strong> {{ review.rating || 0 }}/5
        </p>

        <p class="review-text">
          {{ review.reviewText || 'No review text found.' }}
        </p>

        <p class="review-date">
          {{ review.createdAt || 'No date found.' }}
        </p>

        <a
          *ngIf="review.album?.id"
          [routerLink]="['/albums', review.album?.id]"
          class="album-link"
        >
          View Album
        </a>
      </div>
    </div>
  </div>
