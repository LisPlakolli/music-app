<h1 class="page-title">Album Collection</h1>

<div class="carousel-stage">
  <button class="carousel-side-btn left" (click)="prevSlide()">‹</button>

  <div class="carousel-content">
    <div class="album-grid">
      <a
        *ngFor="let album of slides[currentSlide]"
        class="album-card"
        [routerLink]="['/albums', album.id]"
      >
        <img [src]="album.coverUrl" [alt]="album.title" class="album-image" />

        <div class="album-info">
          <h3>{{ album.title }}</h3>
          <p><strong>Artist:</strong> {{ album.artist }}</p>
          <p><strong>Genre:</strong> {{ album.genre }}</p>
          <p><strong>Year:</strong> {{ album.releaseYear }}</p>
        </div>
      </a>
    </div>
  </div>

  <button class="carousel-side-btn right" (click)="nextSlide()">›</button>
</div>

<div class="carousel-dots">
  <span
    *ngFor="let slide of slides; let i = index"
    class="dot"
    [class.active]="i === currentSlide"
    (click)="goToSlide(i)"
  ></span>
</div>
